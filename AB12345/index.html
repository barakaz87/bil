<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle History</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        .bg { background-image: url("../background.jpg"); height: 100%; background-position: center; background-size: cover; display: flex; align-items: center; justify-content: center; }
        .overlay { position: absolute; height: 100%; width: 100%; background: rgba(0,0,0,0.7); }
        .card { position: relative; z-index: 10; background: white; padding: 25px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; }
        .logo { width: 100px; margin-bottom: 10px; }
        .plate { background: #ffcc00; padding: 5px 15px; font-weight: bold; border-radius: 5px; display: inline-block; margin: 15px 0; border: 2px solid #000; }
        .btn { display: block; background: #007bff; color: white; padding: 15px; margin: 10px 0; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .btn-call { background: #28a745; }
    </style>
</head>
<body>
    <div class="bg">
        <div class="overlay"></div>
        <div class="card">
            <img src="../logo.png" class="logo">
            <h2>Service History</h2>
            <div class="plate">AB 12345</div>
            <a href="history.pdf" class="btn">📄 View Repair Records</a>
            <a href="tel:+4700000000" class="btn btn-call">📞 Call Workshop</a>
        </div>
    </div>
</body>
</html>
