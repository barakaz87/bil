<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Service</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        .bg { 
            background: url("../background.jpg") no-repeat center center fixed; 
            background-size: cover;
            height: 100%; display: flex; align-items: center; justify-content: center;
        }
        .overlay { position: absolute; height: 100%; width: 100%; background: rgba(0,0,0,0.6); }
        .card { position: relative; z-index: 10; background: white; padding: 25px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; }
        .logo { width: 120px; margin-bottom: 10px; }
        .plate { background: #ffcc00; padding: 5px 15px; font-weight: bold; border-radius: 5px; display: inline-block; margin: 15px 0; border: 2px solid #000; color: black; }
        .btn { display: block; background: #007bff; color: white; padding: 15px; margin: 10px 0; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .btn-call { background: #28a745; }
        .no-data { font-size: 0.8rem; color: #666; font-style: italic; }
    </style>
</head>
<body>
    <div class="bg">
        <div class="overlay"></div>
        <div class="card">
            <img src="../logo.png" class="logo" alt="Workshop Logo">
            <h2>Vehicle Portal</h2>
            <div class="plate">AB 12345</div>
            
            <!-- Link to PDF (upload this later) -->
            <a href="#" class="btn" onclick="alert('Repair history is being updated. Please check back soon!')">📄 View Repair Records</a>
            
            <a href="tel:+4711223344" class="btn btn-call">📞 Call Workshop</a>
            <p class="no-data">Digital history coming soon for this vehicle.</p>
        </div>
    </div>
</body>
</html>
